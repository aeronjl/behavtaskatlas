object_type: model_variant
schema_version: 0.1.0
id: model_variant.click-choice-rate-null
family_id: model_family.click-summary-choice
name: Click choice-rate null
description: >
  One-parameter null model for per-subject Poisson clicks findings. It
  estimates a single P(right) across all trials and predicts that same
  rate at every signed click-count level.
free_parameters:
  - response_rate
fixed_parameters: {}
requires:
  - choice_lr
  - click_times
  - subject_id
references: []
curation_status: literature-curated
provenance:
  curators:
    - behavtaskatlas
  created: 2026-04-29
  updated: 2026-04-29
  source_notes: >
    Introduced with the signed click-count logistic baseline to provide
    a same-scope lower bound for Brunton click-summary model selection.
