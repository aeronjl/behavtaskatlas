notes: >
  Anchors the allen_visual_behavior vertical slice to its published reference
  (Garrett et al. 2023, bioRxiv) for the Allen Brain Observatory Visual
  Behavior 2P resource. The curated findings are per-image-pair hit rate
  and an aggregate yes/no go-rate curve from one OPHYS_1 Familiar session
  (behavior_session_id 899390684, mouse 453911) — n=1 mouse, so this is a
  single-session illustration of the change-detection task rather than a
  population estimate.
