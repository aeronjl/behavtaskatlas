notes: >
  Source paper for the macaque_rdm_confidence vertical slice's accuracy
  summary. Underlying behavioral data is from the Kiani-Shadlen 2009
  random-dot motion confidence/wagering task with two monkeys (M1, M2).
  Each accuracy curve is reported separately for trials with no sure-target
  option ("accuracy_no_sure_target") and trials where the sure-target option
  was offered but the direction was chosen instead. The no-sure-target rows
  also have target-coded psychometric and motion-duration chronometric proxy
  findings for per-monkey baseline model fits; these do not recover raw
  signed direction or saccade latency.
