curation_status: data-linked
notes: >
  Source paper for the human visual contrast prior-cue slice. Stratification
  is by cue context (invalid / neutral / valid); each gets its own pooled
  finding. The OSF "1. Behavioural Analysis.mat" file carries 66,200
  processed behavioural rows that the slice harmonizes;
  psychometric_summary.csv is the per-cue-context aggregate. Per-observer
  × per-cue findings (12 observers × 3 cues = 36) are extracted from the
  harmonized trials with min_points=2 so subject J's sparse two-level
  coverage stays included; the audit-findings command verifies that the
  n-weighted aggregate of these subject curves recovers each pooled
  cue curve to numerical precision.
