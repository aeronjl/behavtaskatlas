notes: >
  Directly relevant visual contrast wheel variant that manipulates
  trial-to-trial stimulus-side transition statistics. It deepens the visual
  contrast family along the history/regularity axis while staying within
  sensory-guided decision-making and preserving task variables separately from
  reinforcement-learning interpretations.
