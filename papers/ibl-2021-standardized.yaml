notes: >
  Source paper for the IBL standardized visual decision task. The biased
  trainingChoiceWorld variant carries blockwise prior_context labels
  (p_left=0.2, 0.5, 0.8) which are extracted as separate findings.
  The unbiased trainingChoiceWorld slice exists for navigation but is a
  single training session with too few per-block trials to produce stable
  psychometrics; no findings are currently extracted from it.
