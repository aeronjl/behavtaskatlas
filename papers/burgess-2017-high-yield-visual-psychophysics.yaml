notes: >
  Foundational head-fixed wheel implementation for mouse visual contrast
  psychophysics. It covers both forced two-alternative wheel choices and the
  two-alternative unforced/no-go extension that later underlies Steinmetz-style
  contrast decision datasets. No dedicated public trial-level archive was
  identified for the methods-paper figures; the normal-priority request tracker
  is data_request.burgess-2017-visual-psychophysics-source-data, but later
  public Steinmetz, Zatka-Haas, and IBL releases are likely the first adapter
  targets.
