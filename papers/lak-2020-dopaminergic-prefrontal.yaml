notes: >
  Neural implementation paper for a wheel-based visual contrast task with
  reward-value blocks. It is included because it makes reward value and
  inferred sensory confidence explicit task/model dimensions rather than
  treating contrast alone as the decision variable. Source data are tracked
  through data_request.lak-2020-visual-contrast-wheel-source-data because the
  public article states datasets are available from the corresponding author on
  request.
