notes: >
  Go/no-go lick-based visual discrimination task with variable-contrast
  analyses and passive-viewing controls. It is included as a contrast-family
  boundary case because the evidence axis overlaps with 2AFC contrast tasks but
  the response structure is asymmetric. The article states data and custom
  MATLAB code are available from the corresponding authors upon request, tracked
  by data_request.pho-2018-visual-contrast-gonogo-source-data.
