notes: >
  Cross-species evidence that reward history biases later perceptual decisions
  most strongly when sensory confidence is low. The mouse component uses a
  wheel-based 2AFC visual contrast task and is the component represented in
  this family. The human visual component is a motion task, not a contrast task,
  and should be represented only if a human motion protocol/source record is
  curated later. Mouse visual source data are tracked through
  data_request.lak-2020-visual-contrast-wheel-source-data.
