notes: >
  Classic port-based mouse visual contrast 2AFC paper. The behavioral model
  includes visual contrast, overall port bias, and recent success/failure
  history, making it a key source for separating sensory evidence from reward
  and history effects in the family taxonomy. No public trial-level archive was
  identified in the first source-availability pass; the gap is tracked by
  data_request.busse-2011-visual-contrast-port-trials.
