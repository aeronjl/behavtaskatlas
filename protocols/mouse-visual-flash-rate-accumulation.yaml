object_type: protocol
schema_version: 0.1.0
id: protocol.mouse-visual-flash-rate-accumulation
family_id: family.visual-pulse-evidence-accumulation
name: Mouse visual flash-rate accumulation task
aliases:
  - Odoemene visual evidence accumulation task
  - unrestrained mouse flash-rate discrimination
description: >
  Freely moving mice initiate a trial at a center port, view a one-second
  sequence of visual flashes, and choose between side ports according to whether
  the flash sequence was generated by a low-rate or high-rate process.
species:
  - mouse
curation_status: adapter-ready
stimulus:
  modalities:
    - visual
  variables:
    - flash rate
    - flash timing
    - flash brightness
    - stimulus duration
  evidence_type: pulse-train
  evidence_schedule: >
    Visual flashes occur over a 1000 ms stimulus period with trial-specific rate
    and timing; brightness manipulations are present in some sessions.
  units:
    - flashes per second
    - seconds
choice:
  choice_type: 2afc
  alternatives:
    - low rate
    - high rate
  response_modalities:
    - nose-poke
  action_mapping: >
    Left and right response ports map to low-rate or high-rate choices, with
    contingency manipulations in some animals.
feedback:
  feedback_type: mixed
  reward: Water reward for correct choices.
  penalty: Timeout after incorrect choices.
timing:
  - name: center_hold
    duration: at least 1100 ms
    description: Mouse waits at the center port before and during stimulus delivery.
  - name: visual_flash_train
    duration: 1000 ms
    description: Visual evidence is delivered as a flash sequence.
  - name: go_tone
    duration: brief auditory event
    description: Auditory cue signals the response epoch.
  - name: response
    duration: response-limited
    description: Mouse chooses a side port.
training:
  stages:
    - port initiation
    - low-rate versus high-rate discrimination
    - manipulation sessions
apparatus:
  - unrestrained operant chamber
  - center nose port
  - left and right response ports
  - visual display or LED stimulus
  - water delivery
dataset_ids:
  - dataset.odoemene-visual-evidence-accumulation-cshl
expected_analyses:
  - psychometric curve by flash rate
  - psychophysical kernel over stimulus time
  - brightness-manipulation sensitivity
  - previous-outcome and previous-choice effects
interpretive_claims:
  - label: evidence accumulation
    source: ref.odoemene-2018-visual-accumulation
    confidence: high
    caveat: >
      Accumulation claims require preserving the pulse timing stream, not only
      aggregate flash rate.
references:
  - id: ref.odoemene-2018-visual-accumulation
    citation: >
      Odoemene O, Pisupati S, Nguyen H, Churchland AK. Visual evidence
      accumulation guides decision-making in unrestrained mice. Journal of
      Neuroscience, 2018.
    url: https://www.jneurosci.org/content/38/47/10143
    doi: 10.1523/JNEUROSCI.3478-17.2018
  - id: ref.odoemene-2020-cshl-dataset
    citation: >
      Odoemene O, Pisupati S, Nguyen H, Churchland AK. Dataset from: Visual
      evidence accumulation guides decision-making in unrestrained mice. CSHL
      Scientific Digital Repository, 2020.
    url: https://repository.cshl.edu/id/eprint/38944/
    doi: 10.14224/1.38944
provenance:
  curators:
    - behavtaskatlas
  created: 2026-04-29
  updated: 2026-04-29
  source_notes: >
    Catalog-only protocol added from the CSHL repository record and open paper.
    Updated with an adapter-backed vertical slice contract after verifying the
    MATLAB raw choice field list in the CSHL metadata PDF.
open_questions:
  - Verify one full local source-file run and record exact subject/session counts in generated artifacts.
  - Represent brightness manipulations as task variables rather than nuisance metadata.
