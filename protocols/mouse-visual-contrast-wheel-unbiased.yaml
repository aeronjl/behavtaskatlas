object_type: protocol
schema_version: 0.1.0
id: protocol.mouse-visual-contrast-wheel-unbiased
family_id: family.visual-2afc-contrast
name: Mouse unbiased visual contrast wheel task
aliases:
  - unbiased mouse choice world
  - mouse visual contrast wheel 2AFC
description: >
  Head-fixed mice report the side of a visual contrast stimulus with a response
  wheel in sessions without an explicit blockwise prior manipulation. The task
  isolates contrast and stimulus side as the primary decision variables.
species:
  - mouse
curation_status: data-linked
stimulus:
  modalities:
    - visual
  variables:
    - contrast
    - stimulus side
  evidence_type: static
  evidence_schedule: >
    A grating or similar visual stimulus appears on one side with contrast
    sampled across trials.
  units:
    - percent contrast
choice:
  choice_type: 2afc
  alternatives:
    - left
    - right
  response_modalities:
    - wheel
  action_mapping: >
    Wheel movement reports the side of the stimulus, usually by moving the
    stimulus toward a response position.
feedback:
  feedback_type: mixed
  reward: Water reward for correct choices.
  penalty: Auditory or timeout penalty for incorrect choices, source-dependent.
timing:
  - name: quiescence
    duration: protocol-specific
    description: Mouse holds the wheel still before stimulus onset.
  - name: stimulus_and_response
    duration: response-limited
    description: Visual stimulus remains available during the response period.
  - name: feedback
    duration: outcome-dependent
    contingent_on: choice correctness
training:
  stages:
    - wheel shaping
    - visual discrimination
apparatus:
  - head fixation
  - response wheel
  - visual display
  - water delivery
dataset_ids:
  - dataset.ibl-public-behavior
expected_analyses:
  - psychometric curve by contrast
  - chronometric curve by contrast
  - lapse, bias, and threshold estimates
interpretive_claims:
  - label: perceptual decision-making
    source: ref.ibl-2021-standardized
    confidence: medium
references:
  - id: ref.burgess-2017-high-yield-visual-psychophysics
    citation: >
      Burgess CP et al. High-Yield Methods for Accurate Two-Alternative
      Visual Psychophysics in Head-Fixed Mice. Cell Reports, 2017.
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC5603732/
    doi: 10.1016/j.celrep.2017.08.047
  - id: ref.lak-2020-reinforcement-biases-confidence
    citation: >
      Lak A et al. Reinforcement biases subsequent perceptual decisions when
      confidence is low, a widespread behavioral phenomenon. eLife, 2020.
    url: https://elifesciences.org/articles/49834
    doi: 10.7554/eLife.49834
  - id: ref.ibl-2021-standardized
    citation: >
      The International Brain Laboratory et al. Standardized and reproducible
      measurement of decision-making in mice. eLife, 2021.
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC8137147/
    doi: 10.7554/eLife.63711
provenance:
  curators:
    - behavtaskatlas
  created: 2026-04-24
  updated: 2026-04-30
  source_notes: >
    Linked to the broad IBL public behavioral dataset because IBL public data
    include behavior acquired during the standardized training pipeline, and IBL
    tooling distinguishes `trainingChoiceWorld` from biased and ephys
    choice-world sessions. A first report-backed vertical slice now pins one
    public trainingChoiceWorld session from that archive. Burgess et al. was
    added as the protocol-methods anchor for head-fixed wheel visual
    psychophysics. Lak et al. 2020 eLife was added for reward-history analysis
    of a standard mouse visual contrast wheel task; the human component of that
    paper is motion, not contrast, and is not represented by this protocol.
open_questions:
  - Decide whether this should be modeled as a variant of the IBL protocol or a separate record.
  - Decide how to represent the broader multi-session training trajectory beyond the current single-session slice.
