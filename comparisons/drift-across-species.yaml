object_type: comparison
schema_version: 0.1.0
id: comparison.drift-across-species
title: DDM drift rate across species (macaque vs human RDM)
question: How does the per-unit-coherence drift rate k differ between macaque and human random-dot motion?
framing: >
  Roitman and Palmer fit the same canonical psychometric + chronometric
  curves on the random-dot motion task, on the same x-axis (signed
  motion coherence in percent), in different species. Vanilla DDM fits
  recover three parameters per (paper, subject) — drift per unit
  evidence (k), boundary separation (a), and non-decision time (t0).
  This comparison aggregates all 10 fits (Roitman: 1 pooled + 2
  macaques; Palmer: 1 pooled + 6 humans) so the spread of k across
  species is directly visible.
