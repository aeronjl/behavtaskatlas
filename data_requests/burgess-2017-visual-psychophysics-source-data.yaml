request_draft:
  subject: Request for Burgess et al. 2017 visual psychophysics trial data
  body: |-
    Dear Burgess / Carandini / Harris team,

    I am curating behavtaskatlas, an open-science atlas of sensory-guided decision-making tasks and reusable behavioral-model fits.

    I am mapping the head-fixed mouse visual contrast wheel-task lineage from:

    Burgess CP et al. High-Yield Methods for Accurate Two-Alternative Visual Psychophysics in Head-Fixed Mice. Cell Reports, 2017.

    I could not find a dedicated public trial-level archive for the behavioral sessions behind the methods-paper figures. If these data are available, would you be willing to share them or point me to the preferred public successor dataset? The fields of interest are mouse id, session id, trial index, left/right contrast, choice, no-go outcome where applicable, correctness/reward outcome, and response time.

    The goal is to preserve the operational distinctions between forced wheel 2AFC, unforced/no-go variants, and later IBL/Steinmetz implementations.

    Thank you,
    behavtaskatlas curator
