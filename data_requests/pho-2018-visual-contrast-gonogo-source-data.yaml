request_draft:
  subject: Request for Pho et al. 2018 visual go/no-go trial data
  body: |-
    Dear Pho / Goard / Sur team,

    I am curating behavtaskatlas, an open-science atlas of sensory-guided decision-making tasks and reusable behavioral-model fits.

    I am mapping visual contrast task variants and would like to include the go/no-go visual discrimination task from:

    Pho GN et al. Task-dependent representations of stimulus and choice in mouse parietal cortex. Nature Communications, 2018.

    The article data-availability statement says data and custom MATLAB analysis code are available from the corresponding authors upon request. Would you be willing to share analyzed trial-level behavioral data, or point me to a current public location? The fields of interest are mouse/session ids, target/non-target condition, contrast, engaged/passive condition, lick/no-lick response, hit/miss/false-alarm/correct-reject outcome, and event timing.

    The goal is to preserve this as an explicit go/no-go contrast variant rather than forcing it into a symmetric wheel or port 2AFC schema. I would also observe any redistribution constraints you specify.

    Thank you,
    behavtaskatlas curator
