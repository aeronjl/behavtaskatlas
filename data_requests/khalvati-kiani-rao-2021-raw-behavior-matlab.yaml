purpose: >-
  Replace figure-source and direction-choice proxy fits with harmonized
  trial-level records for the Kiani-Shadlen macaque RDM confidence task, so the
  atlas can fit psychometric and DDM models against real choice/RT outcomes
  rather than inferred accuracy summaries.
blocker_detail: >-
  The Nature source-data ZIP and public POMDP-Confidence code archive provide
  figure source tables and model code, but not the behavioral MATLAB files
  referenced by the code. Without those files, signed direction choice, raw
  session identifiers, and response-time fields cannot be recovered from the
  public package.
next_action: >-
