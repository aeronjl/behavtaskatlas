request_draft:
  subject: Request for Khalvati/Kiani/Rao 2021 macaque behavioral MATLAB files
  body: |-
    Dear Dr. Kiani / Khalvati / Rao team,

    I am curating behavtaskatlas, an open-science atlas of sensory-guided decision-making tasks and reusable behavioral-model fits.

    I am working with the public source-data ZIP and POMDP-Confidence code for:

    Khalvati K, Kiani R, Rao RPN. Bayesian inference with incomplete knowledge explains perceptual confidence and its deviations from accuracy. Nature Communications, 2021.

    The public code appears to reference behavioral MATLAB files named `beh_data.monkey1.mat` and `beh_data.monkey2.mat`, but I could not find those files in the Nature source-data ZIP or the public POMDP-Confidence code archive. Would you be willing to share those analyzed/raw behavioral MATLAB files, or point me to their current public location?

    The immediate use is to build a provenance-preserving trial-level harmonizer for the macaque RDM confidence task, recover signed choice and response-time fields where available, and fit psychometric / DDM models with explicit citation and caveats. I would also appreciate any redistribution terms you want observed for derived canonical trial tables or aggregate model-fit outputs.

    Thank you,
    behavtaskatlas curator
