request_draft:
  subject: Request for Busse et al. 2011 mouse visual contrast trial data
  body: |-
    Dear Busse / Carandini team,

    I am curating behavtaskatlas, an open-science atlas of sensory-guided decision-making tasks and reusable behavioral-model fits.

    I am working on the classic mouse visual contrast 2AFC task from:

    Busse L et al. The detection of visual contrast in the behaving mouse. Journal of Neuroscience, 2011.

    I could not find a public trial-level archive for the behavioral sessions. Would you be willing to share analyzed trial-level behavioral data, or point me to a current public location? The fields of interest are mouse id, session id, trial index, signed contrast/stimulus side, chosen port, correctness/reward outcome, and response time where available.

    The goal is to build a provenance-preserving trial-level harmonizer and compare port-based contrast psychometrics and history effects against later head-fixed wheel visual contrast tasks. I would also observe any redistribution limits you specify for derived canonical trial tables and aggregate model-fit outputs.

    Thank you,
    behavtaskatlas curator
