curation_status: literature-curated
notes: >
  Depth work for this family should be a variant census, not a flat
  bibliography. The first deep-pass paper map now covers classic port-based
  mouse contrast detection, Burgess/Steinmetz wheel forced and unforced tasks,
  reward-value/confidence wheel variants, go/no-go lick contrast variants,
  temporal-regularity wheel variants, IBL standardized behavior, IBL Brainwide
  Map companion analyses, and the current human prior-cue contrast slice.
  Adjacent lever-release visual
  change-detection contrast-threshold papers remain a boundary case until the
  atlas adds explicit cross-family links or a contrast-detection subfamily.
  The real-trial family summary now pools available IBL, IBL Brainwide Map,
  Fritsche temporal-regularities, Steinmetz, and Zatka-Haas canonical outputs
  while preserving strict 2AFC, no-response, and unforced withhold
  distinctions. The current family report
  includes 10 additional Brainwide Map ephysChoiceWorld sessions, giving the
  strict 2AFC wheel side repeated sessions across MFD_05, MFD_08, NR_0029,
  NR_0031, and PL050. The Fritsche source adds 269,168 strict-wheel trials
  across 17 subjects, 665 sessions, and Neutral/Repeating/Alternating
  stimulus-sequence environments. The unforced wheel side now includes all 39
  extracted Steinmetz sessions across 10 subjects, plus the Zatka-Haas
  higher-power table. Zatka-Haas contributes a descriptive perturbation layer with matched
  non-laser comparisons by laser target and signed contrast, surfaced in the
  family report as a compact region-effect CSV and SVG. The family report also
  has protocol-normalized choice curves that separate strict 2AFC wheel rows
  from unforced wheel rows before plotting right-choice, withhold, and
  no-response rates, plus source-, session-, and subject-balanced curves so
  larger trial tables and repeated sessions do not dominate the family-level
  descriptive estimate. Session-balanced curves use canonical session ids,
  including the 34 original sessions inside the Zatka-Haas higher-power table;
  subject-balanced curves use dataset-qualified canonical subject ids before
  averaging response-format bins.
