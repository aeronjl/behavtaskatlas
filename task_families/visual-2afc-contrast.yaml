  source_notes: >
    Initial seed family for the MVP. Expanded after dataset coverage review to
    include lateralized visual contrast datasets with explicit no-go/no-turn
    outcomes, while preserving the operational distinction in concrete protocol
    records. Deepened with a first-pass notable-paper census covering
    port-based, wheel-based, reward-value, go/no-go, IBL, and human prior-cue
    variants.
