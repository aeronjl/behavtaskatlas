object_type: task_family
schema_version: 0.1.0
id: family.visual-2afc-contrast
name: Visual contrast discrimination
aliases:
  - visual contrast discrimination
  - visual contrast 2AFC
  - mouse visual contrast decision
  - contrast psychophysics
description: >
  Sensory-guided visual contrast tasks in which subjects use contrast,
  contrast lateralization, or contrast differences to choose between
  alternatives. The family intentionally covers multiple operational variants:
  port-based freely moving 2AFC, head-fixed wheel 2AFC, wheel-based unforced
  choices with explicit no-go/no-turn outcomes, reward-value block variants,
  and contrast go/no-go boundary cases. Those response formats must be
  preserved separately from cognitive interpretations such as confidence,
  bias, or sensory evidence accumulation.
modalities:
  - visual
