comparison:
  species: mouse
  modality: somatosensory
  stimulus_metric: object shape, object presence, servo position, and optional whisker-contact counts
  evidence_type: static
  choice_type: mixed
  response_modality: lick
  source_data_level: processed-trial
  analysis_outputs: task-rule summary, condition accuracy, detection hit/false-alarm summary
  data_scope: one DANDI NWB session or exported trial table
  canonical_axis: categorical shape/presence and object position; no scalar evidence axis is imposed
provenance:
  curators:
    - behavtaskatlas
  created: 2026-04-29
  updated: 2026-04-29
  source_notes: >
    Slice added after verifying the Scientific Data methods, DANDI version
    metadata, assets manifest, and companion usage notebook. The adapter targets
    the NWB trials table documented in the paper and can also read CSV/TSV
    exports of the same fields for lightweight local testing.
notes: >
  The DANDI release is multi-terabyte and contains large video assets, so raw
  NWB/video files stay in ignored local storage. The base slice treats
  video-derived contact counts as optional task variables while keeping the
  behavioral trial table sufficient for MVP reports.
