object_type: vertical_slice
schema_version: 0.1.0
id: slice.rodgers-whisker-object-recognition
title: Rodgers Whisker Object Recognition
description: >
  Adapter-backed slice contract for the Rodgers DANDI mouse tactile object
  recognition dataset. The harmonizer reads a DANDI NWB session or exported
  trials table, preserving shape stimulus, object position, task rule, lick
  choice, rewarded side, ignore-trial policy, response-window timing, and
  optional whisker-contact counts.
curation_status: adapter-ready
display_order: 70
