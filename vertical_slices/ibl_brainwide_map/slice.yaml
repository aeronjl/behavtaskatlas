title: IBL Brainwide Map Behavior
description: >
  Adapter-backed behavior slice for one IBL Brainwide Map Neuropixels session.
  The harmonizer uses the existing IBL trials-table adapter while stamping the
  canonical rows with the Brainwide Map dataset id and provenance for the
  `Brainwidemap` release tag, AWS registry entry, ONE project, and selected
  trials-table revision.
