notes: >
  This is a behavior-first Brainwide Map slice. Neural probe insertions, spike
  sorting, histology, and video pose features remain deferred outputs, but the
  behavioral provenance explicitly identifies the ephys release rather than the
  broad IBL public behavior archive.
