comparison:
  species: mouse
  modality: visual
  stimulus_metric: bilateral contrast tuple and signed contrast difference
  evidence_type: static
  choice_type: free-response
  response_modality: wheel
  source_data_level: processed-trial
  analysis_outputs: >
    real-trial report, choice surface, withhold rate, laser-state and
    laser-region summaries, matched perturbation deltas, region-effect
    summaries, source code manifest
  data_scope: targeted higher-power inactivation behavioral table plus public code ZIP
  canonical_axis: right contrast minus left contrast, with blank trials as zero
provenance:
  curators:
    - behavtaskatlas
  created: 2026-04-30
  updated: 2026-04-30
  source_notes: >
    Slice added during the visual contrast depth pass. A central-directory
    range read from the split Figshare archive located
    OptogeneticInactivation/Inactivation_HigherPower.mat near the beginning of
    part .001, allowing behavior-first extraction and harmonization without a
    full 19.6 GB download.
notes: >
  The generated artifacts remain under ignored derived paths. The current
  report keeps the pooled choice surface while adding matched perturbation
  comparisons against non-laser trials at the same signed contrast.
