canonical_mapping:
  subject_id: subject identifier from `phs_{subject}.mat`
  session_id: fixed processed dataset id `palmer-huk-shadlen-cosmo2017`
  trial_index: global row index across selected subject files
  stimulus_value: `cohs` converted to signed coherence percentage, right positive
  stimulus_side: positive right, negative left, zero none
  evidence_strength: absolute signed coherence percentage
  choice: choice 0 mapped to left, choice 1 mapped to right
  correct: choice compared with signed coherence, with zero coherence treated as rightward
  response_time: rt in seconds
  response_time_origin: CoSMo2017 reaction-time vector
  feedback: none
  task_variables.subject: source subject id
  task_variables.coherence_fraction: signed source coherence fraction
  task_variables.choice_code: source choice code
source_notes:
  - The CoSMo2017 README says bad trials were removed before distribution.
  - The CoSMo2017 README says zero-coherence choices were assigned randomly.
  - The CoSMo2017 fitting script treats zero-coherence trials as rightward for correctness reconstruction.
