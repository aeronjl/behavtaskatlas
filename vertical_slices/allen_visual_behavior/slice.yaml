object_type: vertical_slice
schema_version: 0.1.0
id: slice.allen-visual-behavior
title: Allen Visual Behavior Change Detection
description: >
  Single-session Allen Brain Observatory Visual Behavior slice mapping the
  go/no-go change-detection task into the canonical trial model. First atlas
  slice exercising go and withhold choice values. Verified end-to-end with
  Visual Behavior 2P behavior_session_id 899390684 (mouse 453911,
  OPHYS_1_images_A, project VisualBehaviorMultiscope), an OPHYS_1 Familiar
  session with 654 trials, hit rate 0.76, false-alarm rate 0.09, d-prime 1.99.
curation_status: analysis-verified
display_order: 50
family_id: family.visual-change-detection
protocol_id: protocol.mouse-visual-change-detection-allen
dataset_id: dataset.allen-brain-observatory-visual-behavior
report_path: allen_visual_behavior/report.html
analysis_result_path: allen_visual_behavior/analysis_result.json
primary_artifact_path: allen_visual_behavior/lick_latency.svg
primary_artifact_label: Open lick-latency SVG
artifact_links:
  - label: Report HTML
    path: allen_visual_behavior/report.html
  - label: Analysis result JSON
    path: allen_visual_behavior/analysis_result.json
  - label: Lick latency SVG
    path: allen_visual_behavior/lick_latency.svg
  - label: Outcome summary CSV
    path: allen_visual_behavior/outcome_summary.csv
  - label: Image-pair summary CSV
    path: allen_visual_behavior/image_pair_summary.csv
  - label: Canonical trials CSV
    path: allen_visual_behavior/trials.csv
  - label: Provenance JSON
    path: allen_visual_behavior/provenance.json
  - label: Slice notes
    path: vertical_slices/allen_visual_behavior/README.md
    path_type: repository
comparison:
  species: mouse
  modality: visual
  stimulus_metric: image change vs no-change
  evidence_type: change-detection
  choice_type: go-no-go
  response_modality: lick
  source_data_level: raw-trial
  analysis_outputs: hit/false-alarm rates, d-prime, per-image-pair table, lick latency
  data_scope: one Allen Visual Behavior 2P behavior session
  canonical_axis: lick=hit on change trials, withhold=correct rejection on catch trials
provenance:
  curators:
    - behavtaskatlas
  created: 2026-04-27
  updated: 2026-04-27
  source_notes: >
    Slice manifest for the Allen Brain Observatory Visual Behavior change-
    detection task. The canonical behavior_session_id is also recorded in
    generated provenance.json (with NWB SHA-256, byte size, and session UUID)
    so a rebuild can verify it is reading the same source bytes.
notes: >
  Public NWB URL pattern is
  https://visual-behavior-ophys-data.s3.amazonaws.com/visual-behavior-ophys/behavior_sessions/behavior_session_<id>.nwb
  for any behavior_session_id listed in the project_metadata/behavior_session_table.csv.
  The slice's canonical session id is 899390684; sister sessions in the same
  project can be substituted by passing --nwb-file pointing at a different
  downloaded NWB.
