object_type: vertical_slice
schema_version: 0.1.0
id: slice.odoemene-visual-accumulation
title: Odoemene Visual Evidence Accumulation
description: >
  Adapter-backed slice contract for the Odoemene et al. mouse visual
  flash-rate accumulation dataset. The harmonizer reads the CSHL MATLAB
  subject-structure file, preserves 25-bin stimulus-event streams, and maps
  low-rate/high-rate category responses onto canonical left/right choices.
curation_status: adapter-ready
display_order: 45
