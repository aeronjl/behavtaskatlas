comparison:
  species: mouse
  modality: visual
  stimulus_metric: signed flash rate relative to 12 Hz boundary
  evidence_type: pulse-train
  choice_type: 2afc
  response_modality: nose-poke
  source_data_level: raw-trial
  analysis_outputs: psychometric curve and 25-bin event-choice kernel
  data_scope: CSHL MATLAB subject-structure file with raw trial-wise choice data
  canonical_axis: high-rate response positive, low-rate response negative
provenance:
  curators:
    - behavtaskatlas
  created: 2026-04-29
  updated: 2026-04-30
  source_notes: >
    Slice added after the Odoemene CSHL metadata confirmed a compact MATLAB
    subject-structure file with raw trial-wise choice data and 25-bin stimulus
    event lists. It remains adapter-ready until the full source file is
    downloaded locally and report metrics are verified. Marked as a follow-up
    slice for the current public artifact release rather than a release blocker.
notes: >
  The CSHL repository points to an external storage area. The adapter expects
  the MATLAB file to be downloaded manually into ignored raw-data storage, so
  this slice remains visible as adapter-ready follow-up until the source file
  and report artifacts are regenerated.
