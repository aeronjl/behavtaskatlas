comparison:
  species: mouse
  modality: multisensory
  stimulus_metric: signed visual evidence, signed auditory evidence, and cue congruence
  evidence_type: mixed
  choice_type: 2afc
  response_modality: wheel
  source_data_level: processed-trial
  analysis_outputs: modality summary, audiovisual condition surface, and conflict choice summary
  data_scope: UCL processed behavioral block or exported trial table
  canonical_axis: rightward evidence positive for both visual and auditory source variables
provenance:
  curators:
    - behavtaskatlas
  created: 2026-04-29
  updated: 2026-04-29
  source_notes: >
    Slice added after verifying the UCL file listing and the pipcoen/2023_CoenSit
    code path. The adapter targets the combined spatialAnalysis block fields
    used by the public analysis code, while allowing CSV exports of the same
    trial fields to avoid loading the full multi-gigabyte release in CI.
notes: >
  The UCL release is large and CC BY-NC-ND 4.0, so source files stay in ignored
  local storage. The default scalar psychometric axis is descriptive only;
  modality-specific evidence variables remain explicit in the canonical rows.
