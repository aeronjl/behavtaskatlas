object_type: vertical_slice
schema_version: 0.1.0
id: slice.coen-audiovisual-spatial-wheel
title: Coen Audiovisual Spatial Wheel
description: >
  Adapter-backed slice contract for the Coen et al. mouse audiovisual spatial
  decision dataset. The harmonizer reads an exported trial table or MATLAB
  combined block from the UCL processed release, preserving visual evidence,
  auditory evidence, cue congruence, wheel choice, reaction time, correctness,
  and inactivation metadata.
curation_status: adapter-ready
display_order: 60
