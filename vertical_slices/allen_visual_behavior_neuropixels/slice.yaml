object_type: vertical_slice
schema_version: 0.1.0
id: slice.allen-visual-behavior-neuropixels
title: Allen Visual Behavior Neuropixels Change Detection
description: >
  Behavior-first Allen Visual Behavior Neuropixels slice mapping one VBN NWB
  trials table from the active visual change-detection block into the canonical
  go/no-go trial model. The slice reuses the Allen change-detection adapter but
  stamps canonical rows, analysis, and provenance with the VBN dataset id so
  electrophysiology-backed sessions are not conflated with the Visual Behavior
  2P source.
curation_status: adapter-ready
display_order: 55
family_id: family.visual-change-detection
protocol_id: protocol.mouse-visual-change-detection-allen
dataset_id: dataset.allen-visual-behavior-neuropixels
report_path: allen_visual_behavior_neuropixels/report.html
analysis_result_path: allen_visual_behavior_neuropixels/analysis_result.json
primary_artifact_path: allen_visual_behavior_neuropixels/lick_latency.svg
primary_artifact_label: Open VBN lick-latency SVG
