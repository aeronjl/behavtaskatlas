comparison:
  species: mouse
  modality: visual
  stimulus_metric: image change vs no-change
  evidence_type: change-detection
  choice_type: go-no-go
  response_modality: lick
  source_data_level: raw-trial
  analysis_outputs: hit/false-alarm rates, d-prime, per-image-pair table, lick latency
  data_scope: one Allen Visual Behavior Neuropixels NWB session
  canonical_axis: lick=hit on change trials, withhold=correct rejection on catch trials
provenance:
  curators:
    - behavtaskatlas
  created: 2026-04-29
  updated: 2026-04-29
  source_notes: >
    Slice added after verifying the AllenSDK VBN tutorials, DANDI 000713
    version metadata, public VBN S3 metadata tables, and Allen data-book
    task structure. Neural side tables are deliberately deferred.
notes: >
  The source archive is DANDI:000713 version 0.240702.1725, with Allen's
  recommended access path through VisualBehaviorNeuropixelsProjectCache or the
  public S3 bucket. The adapter reads the NWB /intervals/trials table directly
  via h5py when a local VBN NWB file is provided.
