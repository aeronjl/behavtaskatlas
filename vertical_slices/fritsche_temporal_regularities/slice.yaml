comparison:
  species: mouse
  modality: visual
  stimulus_metric: signed contrast
  evidence_type: static
  choice_type: 2afc
  response_modality: wheel
  source_data_level: processed-trial
  analysis_outputs: >
    psychometric summary by signed contrast and sequence environment, lag-1
    stimulus-transition and choice-history summaries, subject-environment
    replication table, logistic choice-history coefficients, neutral-session
    adaptation summaries, source code manifest, artifact provenance table,
    canonical trial table, SVG, and static report
  data_scope: generated behavior CSVs from Figshare data.zip
  canonical_axis: right contrast minus left contrast
provenance:
  curators:
    - behavtaskatlas
  created: 2026-04-30
  updated: 2026-04-30
  source_notes: >
    Slice added during visual contrast depth work after verifying the article
    data-availability statement and Figshare API metadata. The first adapter is
    behavior-first and defers photometry/model joins.
notes: >
  The generated artifacts remain under ignored derived paths. Rare source NoGo
  rows are canonical no-response outcomes because the operational task remains
  left/right wheel 2AFC rather than an unforced NoGo design.
