id: slice.fritsche-temporal-regularities
title: Fritsche Temporal Regularities
description: >
  Behavior-first slice for the Fritsche et al. mouse visual decision dataset.
  The adapter reads generated Figshare behavior CSVs, harmonizes wheel choices
  and contrast levels, and preserves Neutral, Repeating, and Alternating
  stimulus-side sequence environments as explicit task variables.
